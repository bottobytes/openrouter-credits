<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenRouter Credits</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      color: #8b949e;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .balance {
      font-size: 4rem;
      font-weight: 700;
      color: #58a6ff;
      margin-bottom: 0.5rem;
      font-variant-numeric: tabular-nums;
    }

    .balance-label {
      font-size: 0.9rem;
      color: #8b949e;
      margin-bottom: 2.5rem;
    }

    .details {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .detail-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      min-width: 160px;
    }

    .detail-card .value {
      font-size: 1.75rem;
      font-weight: 600;
      color: #e1e4e8;
      font-variant-numeric: tabular-nums;
    }

    .detail-card .label {
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 0.25rem;
    }

    .detail-card.usage .value { color: #f0883e; }
    .detail-card.total .value { color: #7ee787; }

    .status {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #484f58;
    }

    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status .dot.online { background: #3fb950; }
    .status .dot.offline { background: #f85149; }
    .status .dot.loading { background: #d29922; animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .error-message {
      margin-top: 1rem;
      color: #f85149;
      font-size: 0.85rem;
      display: none;
    }

    .error-message.visible {
      display: block;
    }

    .balance-dollar {
      font-size: 2rem;
      vertical-align: super;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OpenRouter Credits</h1>

    <div class="balance">
      <span class="balance-dollar">$</span><span id="available">—</span>
    </div>
    <div class="balance-label">available</div>

    <div class="details">
      <div class="detail-card total">
        <div class="value" id="totalCredits">—</div>
        <div class="label">total purchased</div>
      </div>
      <div class="detail-card usage">
        <div class="value" id="totalUsage">—</div>
        <div class="label">total used</div>
      </div>
    </div>

    <div class="error-message" id="errorMsg"></div>

    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Loading...</span>
      <span id="nextUpdate"></span>
    </div>
  </div>

  <script>
    async function fetchCredits() {
      const dot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const errorMsg = document.getElementById('errorMsg');

      dot.className = 'dot loading';
      statusText.textContent = 'Fetching...';
      errorMsg.classList.remove('visible');

      try {
        const res = await fetch('/api/credits');
        if (!res.ok) {
          const errData = await res.json();
          throw new Error(errData.detail || `HTTP ${res.status}`);
        }
        const json = await res.json();
        const { total_credits, total_usage } = json.data;
        const available = total_credits - total_usage;

        document.getElementById('available').textContent = available.toFixed(2);
        document.getElementById('totalCredits').textContent = '$' + total_credits.toFixed(2);
        document.getElementById('totalUsage').textContent = '$' + total_usage.toFixed(2);

        dot.className = 'dot online';
        statusText.textContent = 'Live';
      } catch (err) {
        dot.className = 'dot offline';
        statusText.textContent = 'Offline';
        errorMsg.textContent = 'Error: ' + err.message;
        errorMsg.classList.add('visible');
      }
    }

    // Initial fetch
    fetchCredits();

    // Refresh every 30 seconds
    const nextUpdate = document.getElementById('nextUpdate');
    let countdown = 30;
    setInterval(() => {
      countdown--;
      if (countdown <= 0) {
        fetchCredits();
        countdown = 30;
      }
      nextUpdate.textContent = ' · next refresh in ' + countdown + 's';
    }, 1000);
  </script>
</body>
</html>
