version: '3.8'

services:
  web:
    build: .
    expose:
      - "3000"
    environment:
      PORT: "3000"
      OPENROUTER_MGMT_KEY: ${OPENROUTER_MGMT_KEY}
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    hostname: openrouter-credits
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale_data:/var/lib/tailscale
    cap_add:
      - net_admin
      - net_raw
    command: >
      sh -c "mkdir -p /config && echo '{\"TCP\":{\"443\":{\"HTTPS\":true}},\"Web\":{\"$${TS_CERT_DOMAIN}:443\":{\"Handlers\":{\"/\":{\"Proxy\":\"http://web:3000\"}}}}}' > /config/serve.json && /usr/local/bin/containerboot"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  tailscale_data:
